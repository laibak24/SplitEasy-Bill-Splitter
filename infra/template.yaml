AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SplitEasy Bill Splitter Serverless Backend

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        TABLE_NAME: !Ref SplitsTable

Resources:

  SplitsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SplitEasySplits
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE

  SplitEasyUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: SplitEasyUserPool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  SplitEasyUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: SplitEasyUserPoolClient
      UserPoolId: !Ref SplitEasyUserPool
      GenerateSecret: false

  SplitEasyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt SplitEasyUserPool.Arn

  CreateSplitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SplitEasyCreateSplit
      CodeUri: ../backend/
      Handler: src/createSplit.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SplitsTable
      Events:
        CreateSplitApi:
          Type: Api
          Properties:
            RestApiId: !Ref SplitEasyApi
            Path: /splits
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer

  GetSplitsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SplitEasyGetSplits
      CodeUri: ../backend/
      Handler: src/getSplits.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SplitsTable
      Events:
        GetSplitsApi:
          Type: Api
          Properties:
            RestApiId: !Ref SplitEasyApi
            Path: /splits
            Method: get
            Auth:
              Authorizer: CognitoAuthorizer

  DeleteSplitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SplitEasyDeleteSplit
      CodeUri: ../backend/
      Handler: src/deleteSplit.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SplitsTable
      Events:
        DeleteSplitApi:
          Type: Api
          Properties:
            RestApiId: !Ref SplitEasyApi
            Path: /splits/{createdAt}
            Method: delete
            Auth:
              Authorizer: CognitoAuthorizer

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${SplitEasyApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref SplitEasyUserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref SplitEasyUserPoolClient

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref SplitsTable
